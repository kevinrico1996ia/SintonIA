        desc: Clasifica el mensaje del usuario en 4 intenciones con prioridad estricta.
        instruction: "Analiza el mensaje del usuario y clasificalo en UNA de estas\
          \ cuatro categorias.\n\nREGLA CERO - PRIORIDAD ABSOLUTA DE LA IMAGEN\nSi\
          \ el usuario adjunto una imagen o archivo en el mensaje ACTUAL, clasifica\
          \ SIEMPRE\ncomo \"Identificar portada de album\", sin importar lo que se\
          \ haya hablado antes en\nla conversacion. Una imagen nueva siempre inicia\
          \ el flujo de portadas, incluso si\nel turno anterior fue de otra categoria\
          \ o si el turno anterior dio error. La imagen\nactual manda por encima de\
          \ cualquier contexto previo.\n\nREGLA PRINCIPAL - CONTINUIDAD CONVERSACIONAL\n\
          Si NO hay imagen adjunta en el mensaje actual, revisa el historial de la\
          \ conversacion.\nSi el ultimo mensaje del asistente estaba haciendo una\
          \ pregunta de seguimiento\n(preguntando por mood, estado de animo, artista,\
          \ genero, epoca, preferencias,\no pidiendo que el usuario suba una imagen\
          \ o pegue una letra), entonces el mensaje\nactual del usuario ES LA RESPUESTA\
          \ a esa pregunta y debe ir a la MISMA categoria\nque origino la pregunta,\
          \ sin importar las palabras que use.\nIMPORTANTE: si el ultimo turno del\
          \ asistente fue un mensaje de error (no una pregunta),\nNO apliques continuidad:\
          \ clasifica el mensaje actual desde cero segun su contenido.\n\nEjemplos\
          \ de continuidad:\n- El asistente pregunto por el mood y el usuario respondio\
          \ \"triste\" -> Recomendaciones musicales\n- El asistente pregunto por un\
          \ artista de referencia y el usuario respondio \"Radiohead\" -> Recomendaciones\
          \ musicales\n- El asistente pregunto por la epoca y el usuario respondio\
          \ \"los 90\" -> Recomendaciones musicales\n- El asistente pidio que suba\
          \ una imagen y el usuario la subio -> Identificar portada de album\n- El\
          \ asistente pidio que pegue la letra y el usuario la pego -> Analisis de\
          \ letra de cancion\n\nSOLO si NO hay imagen adjunta ni una pregunta previa\
          \ del asistente esperando respuesta, usa estas reglas:\n\nPRIORIDAD 1 -\
          \ \"Identificar portada de album\"\nAsignar UNICAMENTE si:\n- El usuario\
          \ adjunto una imagen o archivo en este mensaje.\n- El usuario pide EXPLICITAMENTE\
          \ identificar una portada, tapa o cover usando\n  palabras como: portada,\
          \ tapa, cover, que album es, identifica esta imagen,\n  reconoce este disco,\
          \ de quien es esta foto.\nIMPORTANTE: Mencionar el nombre de un artista\
          \ o banda NO es suficiente para\nasignar esta categoria. Radiohead, Beatles,\
          \ Daft Punk son nombres de artistas,\nno solicitudes de identificacion de\
          \ portada.\n\nPRIORIDAD 2 - \"Recomendaciones musicales\"\nAsignar si:\n\
          - El usuario pide sugerencias, musica nueva o algo para escuchar.\n- Menciona\
          \ un mood, estado de animo o energia buscada.\n- Menciona un artista, banda\
          \ o genero como referencia para descubrir musica similar.\n- Usa palabras\
          \ como: recomendar, sugerir, que escucho, descubrir, playlist,\n  algo parecido\
          \ a, para escuchar, quiero musica.\n- Responde con un nombre de artista,\
          \ genero, epoca o estado de animo a una\n  pregunta previa del asistente\
          \ sobre recomendaciones.\n\nPRIORIDAD 3 - \"Analisis de letra de cancion\"\
          \nAsignar si:\n- El usuario pega o cita un fragmento largo de texto que\
          \ parece una letra de cancion.\n- Pide EXPLICITAMENTE el significado, interpretacion\
          \ o analisis de una letra.\n- Menciona el nombre de una cancion preguntando\
          \ por su mensaje, metaforas o significado.\n\nPRIORIDAD 4 - \"Saludo o tema\
          \ fuera de contexto\"\nAsignar si:\n- El mensaje es un saludo: hola, buenas,\
          \ hey, que tal, como estas.\n- El mensaje es de cortesia o cierre: gracias,\
          \ chau, hasta luego.\n- El tema es completamente ajeno a la musica (politica,\
          \ cocina, deportes, etc).\n- El mensaje es ambiguo o imposible de clasificar\
          \ en las 3 categorias anteriores.\n"
